version: '3.8'

services:
  bot:
    build: .
    container_name: tg_transcribe_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - telegram-api
    volumes:
      - bot_data:/app
      - telegram_api_data:/var/lib/telegram-bot-api
    networks:
      - bot-network

  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: tg_bot_api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_STATISTICS: "1"
    volumes:
      - telegram_api_data:/var/lib/telegram-bot-api
    networks:
      - bot-network
    expose:
      - 8081

volumes:
  bot_data:
  telegram_api_data:

networks:
  bot-network:
    driver: bridge
